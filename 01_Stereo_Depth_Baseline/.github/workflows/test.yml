name: Build and Test YOLO Depth

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml opencv-python numpy ultralytics
        
    - name: Run Unit Tests
      run: |
        python3 test_depth_wls.py
        
    - name: Format Check
      run: |
        pip install black pylint
        black --check depth_wls_yolo.py
        # pylint --disable=all --enable=E,F depth_wls_yolo.py
